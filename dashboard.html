<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta http-equiv="X-UA-Compatible" content="ie=edge">
      <link rel="stylesheet" href="style.css">
      <link rel="shortcut icon" type="image/png" href="img/favicon.png"/>
      <!-- 0. Tiêu đề website -->
      <title>Together</title>
</head>
<body>
     <div id="wrapper">
           <!-- 1. Tiêu đề -->
           <h1>CÙNG NHAU</h1>

           <div id="clock-box">
                 <div id="clock">
                       <!-- Nơi hiển thì số ngày yêu nhau (bạn không cân thay đổi gì cũng được) -->
                       <date>0 Ngày</date>
                       <time>00:00:00</time>
                  </div>
            </div>
            
            <div id="info">
                  <div class="one">
                        <!-- 3. Ảnh của bạn nam -->
                        <img src="images/male.jpg" class="avt">
                        <!-- 4. Tên bạn nam -->
                        <p>Bùi Mạnh Dinh</p>
                  </div>
                  <div id="heart">
                        ❤<anni>...</anni>
                  </div>
                  <div class="two">
                        <!-- 5. Ảnh của bạn nữ -->
                        <img src="images/female.jpg" class="avt">

                        <!-- 6. Tên của bạn nữ -->
                        <p>Nguyễn Thị Kim Ngân</p>
                  </div>
            </div>
            
            <!-- Phần play nhạc (không cần thay đổi) -->
            <div id="music">
                  <audio loop autoplay controls>Your browser does not support the audio element.</audio>
            </div>

            <!-- 7. Tiêu đề bên dưới -->
            <footer>💕 Biết ơn những ngày tháng ta đã có nhau 💕</footer>
                <a class="back" href="demo.html">← Quay lại</a>

      </div> 
      
      <script src="app.js"></script>
</body>
</html>
