<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư Gửi Em 💌</title>

  <style>
    body {
      background: #fdf2f8;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .letter {
      background: white;
      max-width: 700px;
      width: 100%;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      line-height: 1.9;
      color: #b11226;;
    }

    .letter h1 {
      text-align: center;
      color: #ec407a;
      margin-bottom: 30px;
    }

    #letterText {
      font-size: 16px;
      white-space: normal;
      min-height: 200px;
    }

    .signature {
      text-align: right;
      margin-top: 30px;
      font-weight: 600;
      color: #ec407a;
      opacity: 0;
      transition: opacity 1s;
    }

    .signature.show {
      opacity: 1;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .back:hover {
      color: #ec407a;
    }
  </style>
</head>
<body>

  <div class="letter">
    <h1>Gửi Em 💖</h1>

    <!-- Nội dung thư sẽ hiện ra tại đây -->
    <div id="letterText"></div>

    <div class="signature" id="sign">
      — MY LOVE —
    </div>

    <a class="back" href="demo.html">← Quay lại</a>
  </div>

  <script>
    const text = `Em à,
Anh viết những dòng này để lưu lại cảm xúc của anh trong những ngày chúng ta ở bên nhau.
Anh muốn nói với bé là anh cảm ơn bé vì đã đến, đã ở lại và đã trở thành một phần rất quan trọng trong cuộc sống của anh.
Từ ngày gặp em, cuộc sống của anh như được thắp sáng. Những ngày có em là những ngày anh biết thế nào là hạnh phúc thật sự.Anh không dám chắc tương lai sẽ ra sao, nhưng anh biết rằng trong mọi dự định của mình, anh luôn mong có em ở đó.
Anh mong một ngày nào đó, chúng ta vẫn nắm tay nhau như bây giờ — cùng lớn lên, cùng trưởng thành, cùng đi qua những tháng năm không quá rực rỡ nhưng đủ ấm áp. Cùng nhìn nhau già đi, cùng mỉm cười khi nhớ lại những khoảnh khắc rất đỗi bình thường… mà lại là cả thế giới của hai đứa.
Cảm ơn em - cuczang cụa anhhh`;

    let index = 0;
    const speed = 60; // tốc độ gõ chữ (ms)

    function typeText() {
      if (index < text.length) {
        const char = text[index] === "\n" ? "<br>" : text[index];
        document.getElementById("letterText").innerHTML += char;
        index++;
        setTimeout(typeText, speed);
      } else {
        // Hiện chữ ký khi gõ xong
        document.getElementById("sign").classList.add("show");
      }
    }

    typeText();
  </script>
<audio autoplay loop>
  <source src="music/50nam.mp3" type="audio/mpeg">
</audio>
</body>
</html>
