<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta http-equiv="X-UA-Compatible" content="ie=edge">
      <link rel="stylesheet" href="style.css">

      <!-- 0. Tiêu đề website -->
      <title>Together</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">


 <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
@keyframes heartbeat {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.15); }
  40%  { transform: scale(1); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
    body {
      display: flex;
      height: 100vh;
      background-color: #f4f6f9;
    }
.heart-icon {
  font-size: 48px;
  color: #e53935;
  animation: heartbeat 1.4s infinite;
  transform-origin: center;
}
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 22px;
      text-align: center;
    }

    .menu a {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      margin-bottom: 10px;
      color: #0e0901;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s, color 0.3s;
    }

    .menu a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .menu a:hover {
      background: #334155;
      color: #ffffff;
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 30px;
    }

    .main-content h1 {
      font-size: 28px;
      color: #1e293b;
      margin-bottom: 10px;
    }

    .main-content p {
      color: #475569;
    }

    /* Optional: Shadow & card style */
    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

.logo {
  color: #ec407a;
  font-weight: 700;
  letter-spacing: 2px;
  text-shadow: 0 2px 6px rgba(236, 64, 122, 0.4);
}



.male-name {
  font-family: 'Great Vibes', cursive;
  font-size: 26px;

  background: linear-gradient(135deg, #f093fb, #f5576c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* text-shadow: 0 2px 6px rgba(0,0,0,0.45); */
}
  </style>



</head>
<body>




  <div class="sidebar">
<h1 class="logo">MY LOVE  </h1>
    <div class="menu">
      <a href="#"><i class="fas fa-home"></i> Trang chủ</a>
      <a href="#" onclick="giaotask()">
        <i class="fas fa-file-alt"></i> Day love
      </a>

      <a href="giaotask.html">

    </div>
  </div> 




     <div id="wrapper">
           <!-- 1. Tiêu đề -->
           <h1 class="name male-name">Đang yêu <i class="fa-solid fa-heart"></i></h1>

           <div id="clock-box">
                 <div id="clock">
                       <!-- Nơi hiển thì số ngày yêu nhau (bạn không cân thay đổi gì cũng được) -->
                       <date>0 Ngày</date>
                       <time>00:00:00</time>
                  </div>
            </div>
            
            <div id="info">
                  <div class="one">
                        <!-- 3. Ảnh của bạn nam -->
                        <img src="images/male.jpg" class="avt">
                        <!-- 4. Tên bạn nam -->
  <p class="name male-name">Bùi Mạnh Dinh</p>
                  </div>
                  <!-- <div id="heart">
                        ❤<anni>...</anni>
                  </div> -->
                  <div id="heart">
  <span class="heart-icon">❤</span><anni>...</anni>
</div>
                  <div class="two">
                        <!-- 5. Ảnh của bạn nữ -->
                        <img src="images/female.jpg" class="avt">

                        <!-- 6. Tên của bạn nữ -->
  <p class="name male-name">Nguyễn Thị Kim Ngân</p>
                  </div>
            </div>
            
            <!-- Phần play nhạc (không cần thay đổi) -->
            <div id="music">
                  <audio loop autoplay controls>Your browser does not support the audio element.</audio>
            </div>

            <!-- 7. Tiêu đề bên dưới -->
            <footer>💕 Biết ơn những ngày tháng ta đã có nhau 💕</footer>
      </div>
